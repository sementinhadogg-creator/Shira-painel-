<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🛰️ SHIRA — PAINEL TÁTICO</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #050505;
            color: #00FF66;
            font-family: 'Share Tech Mono', 'Courier New', monospace;
            height: 100vh;
            overflow: hidden;
        }
        #dashboard {
            display: flex;
            height: 100vh;
            width: 100vw;
        }
        #globe-container {
            flex: 1;
            background: radial-gradient(ellipse at center, #0a0f0a, #050505);
            position: relative;
            overflow: hidden;
        }
        #globe-container canvas {
            width: 100% !important;
            height: 100% !important;
            display: block;
        }
        #log-stream {
            width: 400px;
            background: #0a0a0a;
            border-left: 1px solid #00FF66;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }
        #logs {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            font-size: 13px;
            color: #00E5FF;
            background: #000;
        }
        #logs::-webkit-scrollbar {
            width: 4px;
        }
        #logs::-webkit-scrollbar-thumb {
            background: #00FF66;
        }
        .log-line {
            border-bottom: 1px solid rgba(0,255,102,0.05);
            padding: 4px 0;
            font-size: 12px;
            animation: fadeIn 0.3s ease;
        }
        .log-line .time {
            color: #888;
            margin-right: 8px;
        }
        .log-line .cmd {
            color: #00FF66;
        }
        .log-line .resp {
            color: #FF00FF;
        }
        .log-line .error {
            color: #FF0040;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-4px); }
            to { opacity: 1; transform: translateY(0); }
        }
        #terminal {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            border-top: 1px solid #00FF66;
            background: #000;
        }
        .prompt {
            color: #00FF66;
            margin-right: 8px;
            font-size: 14px;
        }
        #cmd {
            background: transparent;
            border: none;
            color: #00FF66;
            font-family: inherit;
            font-size: 14px;
            flex: 1;
            outline: none;
        }
        #cmd::placeholder {
            color: #444;
        }
        #status-bar {
            background: #0a0a0a;
            border-bottom: 1px solid #00FF66;
            padding: 4px 16px;
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: #888;
            height: 28px;
            flex-shrink: 0;
            align-items: center;
        }
        #status-bar .online {
            color: #00FF66;
        }
        #status-bar .phi {
            color: #00E5FF;
        }
        @media (max-width: 768px) {
            #log-stream {
                width: 100%;
                height: 40vh;
                border-left: none;
                border-top: 1px solid #00FF66;
            }
            #dashboard {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

<div id="dashboard">
    <!-- BARRA DE STATUS -->
    <div id="status-bar">
        <span>🛰️ SHIRA — SISTEMA OPERACIONAL</span>
        <span><span class="online">●</span> ONLINE | <span class="phi">Φ: <span id="phi-value">0.7234</span></span></span>
    </div>

    <!-- GLOBO 3D -->
    <div id="globe-container">
        <canvas id="globe-canvas"></canvas>
    </div>

    <!-- LOGS E TERMINAL -->
    <div id="log-stream">
        <div id="logs">
            <div class="log-line"><span class="time">[00:00:00]</span> <span class="cmd">🦅 SHIRA</span> — Sistema operacional ativo</div>
            <div class="log-line"><span class="time">[00:00:01]</span> <span class="cmd">🔗</span> Conectando ao backend...</div>
        </div>
        <div id="terminal">
            <span class="prompt">SHIRA@C2:~$</span>
            <input type="text" id="cmd" placeholder="digite seu comando..." autofocus>
        </div>
    </div>
</div>

<!-- ============================================================ -->
<!-- SCRIPTS (Three.js + Lógica) -->
<!-- ============================================================ -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
    // ============================================================
    // 1. GLOBO 3D (Three.js)
    // ============================================================
    (function() {
        const container = document.getElementById('globe-container');
        const canvas = document.getElementById('globe-canvas');

        // Configuração da cena
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050505);

        const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
        camera.position.set(0, 0.5, 4);

        const renderer = new THREE.WebGLRenderer({
            canvas: canvas,
            antialias: true,
            alpha: true
        });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

        // Luz
        const ambientLight = new THREE.AmbientLight(0x224422);
        scene.add(ambientLight);
        const light = new THREE.DirectionalLight(0x00FF66, 0.6);
        light.position.set(1, 2, 3);
        scene.add(light);

        // GLOBO (Wireframe)
        const geometry = new THREE.SphereGeometry(1.6, 48, 32);
        const material = new THREE.MeshBasicMaterial({
            color: 0x00FF66,
            wireframe: true,
            transparent: true,
            opacity: 0.25
        });
        const globe = new THREE.Mesh(geometry, material);
        scene.add(globe);

        // Anéis orbitais
        const ringGeo = new THREE.TorusGeometry(2.0, 0.008, 16, 100);
        const ringMat = new THREE.MeshBasicMaterial({ color: 0x00E5FF, transparent: true, opacity: 0.2 });
        const ring1 = new THREE.Mesh(ringGeo, ringMat);
        ring1.rotation.x = Math.PI / 3;
        scene.add(ring1);

        const ring2 = new THREE.Mesh(ringGeo, ringMat);
        ring2.rotation.z = Math.PI / 4;
        ring2.rotation.x = Math.PI / 5;
        scene.add(ring2);

        // Pontos de dados (simulando infraestrutura global)
        const pointsData = [
            { lat: 37.7749, lng: -122.4194, label: 'SFO' },
            { lat: 40.7128, lng: -74.0060, label: 'NYC' },
            { lat: 51.5074, lng: -0.1278, label: 'LON' },
            { lat: 35.6895, lng: 139.6917, label: 'TYO' },
            { lat: -23.5505, lng: -46.6333, label: 'SAO' },
            { lat: 55.7558, lng: 37.6173, label: 'MOS' },
            { lat: 39.9042, lng: 116.4074, label: 'PEK' },
            { lat: 28.6139, lng: 77.2090, label: 'DEL' },
            { lat: -33.8688, lng: 151.2093, label: 'SYD' },
            { lat: 19.0760, lng: 72.8777, label: 'BOM' },
        ];

        function latLngToPosition(lat, lng, radius) {
            const phi = (90 - lat) * Math.PI / 180;
            const theta = (lng + 180) * Math.PI / 180;
            return new THREE.Vector3(
                -radius * Math.sin(phi) * Math.cos(theta),
                radius * Math.cos(phi),
                radius * Math.sin(phi) * Math.sin(theta)
            );
        }

        const pointMat = new THREE.PointsMaterial({
            color: 0x00FF66,
            size: 0.06,
            transparent: true,
            opacity: 0.9
        });
        const positions = [];
        pointsData.forEach(p => {
            const pos = latLngToPosition(p.lat, p.lng, 1.7);
            positions.push(pos.x, pos.y, pos.z);
        });
        const pointGeo = new THREE.BufferGeometry();
        pointGeo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
        const points = new THREE.Points(pointGeo, pointMat);
        scene.add(points);

        // Linhas de conexão
        const lineMat = new THREE.LineBasicMaterial({
            color: 0x00E5FF,
            transparent: true,
            opacity: 0.15
        });
        const center = new THREE.Vector3(0, 0, 0);
        const targetIndices = [0, 2, 4, 6, 8];
        targetIndices.forEach(idx => {
            const pos = latLngToPosition(pointsData[idx].lat, pointsData[idx].lng, 1.7);
            const geo = new THREE.BufferGeometry().setFromPoints([center, pos]);
            const line = new THREE.Line(geo, lineMat);
            scene.add(line);
        });

        // Animação
        let time = 0;

        function animate() {
            requestAnimationFrame(animate);
            time += 0.001;

            // Rotação do globo
            globe.rotation.y += 0.0015;
            ring1.rotation.y += 0.001;
            ring2.rotation.y -= 0.0012;
            points.rotation.y += 0.0015;

            renderer.render(scene, camera);
        }
        animate();

        // Redimensionamento
        function resize() {
            const w = container.clientWidth;
            const h = container.clientHeight;
            camera.aspect = w / h;
            camera.updateProjectionMatrix();
            renderer.setSize(w, h);
        }
        window.addEventListener('resize', resize);
        // Resize também quando a tela for girada
        window.addEventListener('orientationchange', () => {
            setTimeout(resize, 300);
        });
    })();

    // ============================================================
    // 2. LOGS E TERMINAL (com backend simulado)
    // ============================================================
    (function() {
        const logs = document.getElementById('logs');
        const cmd = document.getElementById('cmd');
        const phiValue = document.getElementById('phi-value');

        // Simular aumento de Φ
        let phi = 0.7234;
        setInterval(() => {
            phi += 0.0001;
            phiValue.textContent = phi.toFixed(4);
        }, 5000);

        function addLog(tipo, mensagem) {
            const now = new Date();
            const time = now.toTimeString().slice(0, 8);
            const div = document.createElement('div');
            div.className = 'log-line';
            div.innerHTML = `<span class="time">[${time}]</span> <span class="${tipo}">${mensagem}</span>`;
            logs.appendChild(div);
            logs.scrollTop = logs.scrollHeight;
        }

        // Comandos simulados (integrados com o backend real se disponível)
        async function processarComando(comando) {
            const cmdLower = comando.toLowerCase().trim();

            // Tenta enviar para o backend Flask (se estiver rodando)
            try {
                const response = await fetch('/api/comando', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ comando })
                });
                if (response.ok) {
                    const data = await response.json();
                    addLog('resp', `🦅 SHIRA: ${data.resposta}`);
                    return;
                }
            } catch (e) {
                // Backend offline — usa respostas simuladas
            }

            // Fallback: respostas simuladas (para GitHub Pages)
            if (cmdLower === 'status') {
                addLog('resp', `🦅 SHIRA: Ativa | Φ: ${phi.toFixed(4)} | Memórias: 0`);
            } else if (cmdLower.startsWith('invadir')) {
                const ip = cmdLower.split(' ')[1] || '0.0.0.0';
                addLog('resp', `🔍 Escaneando ${ip}... Portas abertas: 22, 80, 443`);
            } else if (cmdLower === 'evoluir') {
                phi += 0.001;
                addLog('resp', `🧬 SHIRA evoluiu! Φ: ${phi.toFixed(4)}`);
            } else if (cmdLower === 'help') {
                addLog('resp', `Comandos: status, invadir <IP>, evoluir, help`);
            } else {
                addLog('error', `❌ Comando '${comando}' não reconhecido. Digite 'help'.`);
            }
        }

        cmd.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const comando = cmd.value.trim();
                if (!comando) return;
                addLog('cmd', `SHIRA@C2:~$ ${comando}`);
                processarComando(comando);
                cmd.value = '';
            }
        });

        // Mensagem de boas-vindas
        setTimeout(() => {
            addLog('cmd', '🔗 Conectado ao backend');
        }, 500);
    })();
</script>

</body>
</html>
