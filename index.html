<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>🛰️ SHIRA — PAINEL TÁTICO</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
</head>
<body>
    <div id="dashboard">
        <div id="globe-container">
            <canvas id="globe"></canvas>
        </div>
        <div id="log-stream">
            <div id="logs">
                <div class="log-line">🦅 SHIRA — Sistema operacional ativo</div>
                <div class="log-line">🔗 WebSocket conectado</div>
            </div>
            <div id="terminal">
                <span class="prompt">SHIRA@C2:~$</span>
                <input type="text" id="cmd" placeholder="digite seu comando..." autofocus>
            </div>
        </div>
    </div>
    <script src="painel.js"></script>
</body>
</html>
